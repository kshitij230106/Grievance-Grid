<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArchTrade – Computer Architecture Simulator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="stage">
        <!-- Animated blur blobs (nebula) -->
        <div class="blob-layer" aria-hidden="true">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
            <div class="blob blob-3"></div>
            <div class="blob blob-4"></div>
            <div class="blob blob-5"></div>
        </div>
        <!-- Fine-grain noise overlay -->
        <div class="noise" aria-hidden="true"></div>

        <div class="content">
            <h1>ArchTrade</h1>
            <p class="tagline">Computer Architecture Simulator</p>

            <div class="artifact-tilt" id="artifactTilt">
                <div class="artifact-beam"></div>
                <div class="artifact">
                    <form id="simForm">
                        <label for="workload">Workload</label>
                        <select id="workload" name="workload" required>
                            <option value="fibonacci">Fibonacci</option>
                            <option value="matrix_multiply">Matrix Multiply</option>
                            <option value="array_sum">Array Sum</option>
                            <option value="bubble_sort">Bubble Sort</option>
                            <option value="random_memory_access">Random Memory Access</option>
                            <option value="io_processing">IO Processing</option>
                        </select>

                        <label for="instruction_set">Instruction Set</label>
                        <select id="instruction_set" name="instruction_set" required>
                            <option value="risc">RISC</option>
                            <option value="cisc">CISC</option>
                        </select>

                        <label for="pipeline">Pipeline</label>
                        <select id="pipeline" name="pipeline" required>
                            <option value="single_cycle">Single Cycle</option>
                            <option value="5_stage">5 Stage</option>
                        </select>

                        <label for="cache">Cache</label>
                        <select id="cache" name="cache" required>
                            <option value="direct_mapped">DirectMapped</option>
                            <option value="set_associative">SetAssociative</option>
                        </select>

                        <label for="io_type">IO Method</label>
                        <select id="io_type" name="io_type" required>
                            <option value="polling">Polling</option>
                            <option value="dma">DMA</option>
                        </select>

                        <div class="form-actions">
                            <button type="submit" id="runBtn"><span>Run Simulation</span></button>
                        </div>
                    </form>
                </div>
            </div>

            <h2>Simulation results</h2>
            <pre id="result">No results yet. Click "Run Simulation" to run.</pre>
        </div>
    </div>

    <script>
        (function() {
            var form = document.getElementById('simForm');
            var runBtn = document.getElementById('runBtn');
            var resultEl = document.getElementById('result');
            var tiltEl = document.getElementById('artifactTilt');

            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                runBtn.disabled = true;
                resultEl.textContent = 'Running simulation…';
                resultEl.classList.remove('error');

                var payload = {
                    workload: document.getElementById('workload').value,
                    instruction_set: document.getElementById('instruction_set').value,
                    pipeline: document.getElementById('pipeline').value,
                    cache: document.getElementById('cache').value,
                    io_type: document.getElementById('io_type').value
                };

                try {
                    var res = await fetch('/run', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    var data = await res.json();
                    if (data.ok) {
                        resultEl.textContent = data.output || '(No output)';
                    } else {
                        resultEl.textContent = (data.error || 'Error') + (data.output ? '\n\n' + data.output : '');
                        resultEl.classList.add('error');
                    }
                } catch (err) {
                    resultEl.textContent = 'Request failed: ' + err.message;
                    resultEl.classList.add('error');
                }
                runBtn.disabled = false;
            });

            // Mouse-follow 3D tilt
            function setTilt(e) {
                if (!tiltEl) return;
                var rect = tiltEl.getBoundingClientRect();
                var x = (e.clientX - rect.left) / rect.width - 0.5;
                var y = (e.clientY - rect.top) / rect.height - 0.5;
                var tiltX = -y * 8;
                var tiltY = x * 8;
                tiltEl.style.setProperty('--tilt-x', tiltX + 'deg');
                tiltEl.style.setProperty('--tilt-y', tiltY + 'deg');
            }
            function resetTilt() {
                if (tiltEl) {
                    tiltEl.style.setProperty('--tilt-x', '0deg');
                    tiltEl.style.setProperty('--tilt-y', '0deg');
                }
            }
            document.addEventListener('mousemove', setTilt);
            tiltEl && tiltEl.addEventListener('mouseleave', resetTilt);
        })();
    </script>
</body>
</html>
